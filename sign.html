<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Amana Website</title>
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
    <link rel="stylesheet" href="sign.css">
</head>
<body>
    <div class="Wrapper">
        
        <nav class="nav">
            <div class="nav-logo">
                 <a href="#"><img src="logo.png.png" alt="Amanah" class="logo"></a>
            </div>
            
            <div class="nav-button">
                <button class="btn white-btn" id="loginBtn" onclick="login()">Sign In</button>
                <button class="btn" id="registerBtn" onclick="register()">Sign Up</button>
            </div>
           
        </nav>

        <div class="form-box">
            
            <div class="login-container" id="login">
                <div class="top">
                    <span>Don't have an account? <a href="#" onclick="register()">Sign Up</a></span>
                    <header>Login</header>
                </div>
                <div class="input-box">
                    <input type="text" class="input-field" placeholder="Username or Email">
                    <i class="bx bx-user"></i>
                </div>
                <div class="input-box">
                    <input type="password" class="input-field" placeholder="Password">
                    <i class="bx bx-lock-alt"></i>
                </div>
                <div class="input-box">
                    <input type="submit" class="submit" value="Sign In" onclick="window.location.href='learn.html'">
                </div>
                <div class="two-col">
                    <div class="one">
                        <input type="checkbox" id="login-check">
                        <label for="login-check"> Remember Me</label>
                    </div>
                    <div class="two">
                        <label><a href="#">Forgot password?</a></label>
                    </div>
                </div>
            </div>

            <div class="register-container" id="register">
                <div class="top">
                    <span>Have an account? <a href="#" onclick="login()">login</a></span>
                    <header>Sign Up</header>
                </div>
                <div class="two-forms">
                    <div class="input-box">
                        <input type="text" class="input-field" placeholder="Firstname">
                        <i class="bx bx-user"></i>
                    </div>
                    <div class="input-box">
                        <input type="text" class="input-field" placeholder="Lastname">
                        <i class="bx bx-user"></i>
                    </div>
                </div>
                <div class="input-box">
                    <input type="email" class="input-field" placeholder="Email">
                    <i class="bx bx-envelope"></i>
                </div>
                <div class="input-box">
                    <input type="password" class="input-field" placeholder="Password">
                    <i class="bx bx-lock-alt"></i>
                </div>
                <div class="input-box">
                    <input type="submit" class="submit" value="Register" onclick="window.location.href='learn.html'">
                </div>
                <div class="two-col">
                    <div class="one">
                        <input type="checkbox" id="register-check">
                        <label for="register-check"> Remember Me</label>
                    </div>
                    <div class="two">
                        <label><a href="#">Terms & Conditions</a></label>
                    </div>
                </div>
            </div>

        </div>
    </div>

    <script>
        var x = document.getElementById("login");
        var y = document.getElementById("register");
        var a = document.getElementById("loginBtn");
        var b = document.getElementById("registerBtn");

        
function login() {
    // الحركة الأصلية بتاعتك
    x.style.left = "4px";
    y.style.right = "-520px";
    x.style.opacity = "1";
    y.style.opacity = "0";
    
    // 🛠️ التظبيط الصح هنا: بنكتب اسم الكلاس نضيف بالمسطرة 🛠️
    a.className = "btn white-btn"; // الساين إن ياخد الأبيض
    b.className = "btn";           // الساين أب يرجع شفاف
}

function register() {
    // الحركة الأصلية بتاعتك
    x.style.left = "-510px";
    y.style.right = "5px";
    x.style.opacity = "0";
    y.style.opacity = "1";
    
    // 🛠️ التظبيط الصح هنا 🛠️
    a.className = "btn";           // الساين إن يرجع شفاف
    b.className = "btn white-btn"; // الساين أب ياخد الأبيض
}

        //     y.style.right = "-520px";
           
        //     x.style.opacity = "1";

        //     b.className = "btn";
        //     a.className = "btn white-btn";

        //     a.className = "btn";
        //     b.className = " white-btn";

function validateAndRedirect(event) {
    event.preventDefault();
    
    let username = document.querySelector('.input-field[placeholder="Username or Email"]').value.trim();
    let password = document.querySelector('.input-field[placeholder="Password"]').value.trim();
    
    if(username === "" || password === "") {
        alert("❌ من فضلك أدخل اسم المستخدم وكلمة السر");
        return;
    }
    window.location.href = "home.html";
    
}
    
    
    </script>
</body>
</html>
